name: Bump Package Version

on:
  push:
    branches: [main]
    paths-ignore:
      - "package.json"
      - "CHANGELOG.md"

permissions:
  contents: write

jobs:
  bump-version:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from commit message
        id: bump
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$MSG" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:' || echo "$MSG" | grep -q 'BREAKING CHANGE'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qE '^feat(\([^)]*\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package.json version
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
          RANGE="${PREV_TAG:+$PREV_TAG..}HEAD"

          ADDED=() ; FIXED=() ; CHANGED=()
          while IFS= read -r c; do
            [ -z "$c" ] && continue
            case "$c" in
              feat*) ADDED+=("- ${c#*: }") ;;
              fix*) FIXED+=("- ${c#*: }") ;;
              *) CHANGED+=("- $c") ;;
            esac
          done < <(git log "$RANGE" --pretty=format:'%s' --no-merges | grep -v '^chore: bump version')

          {
            echo "## [${{ steps.version.outputs.version }}] - $(date -u +%Y-%m-%d)"
            if [ ${#ADDED[@]} -gt 0 ]; then echo "" ; echo "### Added" ; printf '%s\n' "${ADDED[@]}"; fi
            if [ ${#FIXED[@]} -gt 0 ]; then echo "" ; echo "### Fixed" ; printf '%s\n' "${FIXED[@]}"; fi
            if [ ${#CHANGED[@]} -gt 0 ]; then echo "" ; echo "### Changed" ; printf '%s\n' "${CHANGED[@]}"; fi
            echo ""
          } > new_entry.md

          if grep -q '^## \[' CHANGELOG.md; then
            awk -v newfile=new_entry.md '
              BEGIN { while ((getline line < newfile) > 0) entry = entry line "\n" }
              !inserted && /^## \[/ { printf "%s", entry; inserted=1 }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp
          else
            cat CHANGELOG.md new_entry.md > CHANGELOG.md.tmp
          fi
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
